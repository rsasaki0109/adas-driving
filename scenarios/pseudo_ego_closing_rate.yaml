schema_version: planning_scenario.v0.1
name: pseudo_ego_closing_rate
description: Approaching lead without ego measurement should infer pseudo speed from closing rate.
perception_json: tests/fixtures/planning/lead_closing.json
config: configs/planning/default.yaml
checks:
  - name: target_speed_from_closing_rate
    type: target_speed_rate
    frame_indices: [3, 4, 5]
    min_rate: 1.0
  - name: closing_rate_source
    type: debug_field_rate
    field: ego_speed_source
    value: closing_rate
    frame_indices: [3, 4, 5]
    min_rate: 1.0
