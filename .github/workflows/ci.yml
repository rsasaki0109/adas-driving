name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q -k "not slow"
      - name: Run planning scenarios
        run: |
          python scripts/generate_planning_test_fixtures.py
          python scripts/eval_planning_scenarios.py \
            --scenarios-dir scenarios \
            --output outputs/ci_planning_scenarios.json
