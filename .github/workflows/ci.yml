name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q -k "not slow"
      - name: Run planning scenarios
        run: |
          python scripts/generate_planning_test_fixtures.py
          python scripts/eval_planning_scenarios.py \
            --scenarios-dir scenarios \
            --output outputs/ci_planning_scenarios.json
      - name: Run planning baseline compare
        run: |
          python scripts/compare_planning_baselines.py \
            --input examples/fixtures/planning_demo_perception.json \
            --output outputs/ci_planning_baseline_compare.json \
            --metrics-dir outputs/ci_planning_metrics
      - name: Export planning benchmark tables
        run: |
          python scripts/export_planning_benchmark.py \
            --compare-json outputs/ci_planning_baseline_compare.json \
            --csv outputs/ci_planning_benchmark.csv \
            --markdown outputs/ci_planning_benchmark.md \
            --json outputs/ci_planning_benchmark_export.json
      - name: Run planning E2E demo
        run: |
          python scripts/run_planning_demo.py \
            --output-dir outputs/ci_planning_demo \
            --max-frames 5 \
            --compare-configs \
            --export-benchmark
      - name: Run web demo planning render smoke
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_web_demo_planning.py
