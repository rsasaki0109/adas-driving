# BDD100K even-index copy-paste training experiment at 1024px.
# Thresholds were selected with a cached prediction sweep on 1,000 even-index
# BDD100K validation-mirror frames. Report this config on held-out odd-index
# frames.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k_even_copy_paste_1024_1ep.pt
  device: auto
  image_size: 1024
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.30
    vehicle: 0.25
    traffic_sign: 0.30
    traffic_light: 0.25
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
