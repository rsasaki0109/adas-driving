# Single-pass inference-side preset: current best weights + TTA + tuned thresholds
# plus per-kind post-fusion NMS for small-object duplicate suppression.
# Evaluate on odd-index BDD100K val split; compare against kind_tuned_tta_tuned_tiny.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  augment: true
  score_threshold: 0.20
  score_thresholds_by_kind:
    pedestrian: 0.35
    vehicle: 0.35
    traffic_sign: 0.35
    traffic_light: 0.30
  score_thresholds_by_size:
    tiny:
      traffic_light: 0.25
      traffic_sign: 0.30
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light
  post_process:
    enabled: true
    nms:
      enabled: true
      default_iou: 0.50
      iou_by_kind:
        pedestrian: 0.45
        vehicle: 0.50
        traffic_sign: 0.35
        traffic_light: 0.35

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
