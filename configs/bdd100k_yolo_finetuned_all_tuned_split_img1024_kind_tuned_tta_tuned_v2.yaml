# Current best weights + TTA + finer per-kind thresholds refined via a 6x5x6x5
# grid sweep around the v1 TTA-tuned optimum. Only traffic_light moved
# (0.30 -> 0.275); other kinds stayed at the v1 values. Report on odd-index
# 5,000 frames.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  augment: true
  score_threshold: 0.20
  score_thresholds_by_kind:
    pedestrian: 0.35
    vehicle: 0.35
    traffic_sign: 0.35
    traffic_light: 0.275
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
