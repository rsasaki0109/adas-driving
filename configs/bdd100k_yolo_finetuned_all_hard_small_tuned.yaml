# BDD100K hard-frame/small-object YOLOv8n experiment with per-kind thresholds
# selected on even-index BDD100K val frames.
# Report this on a held-out split such as odd-index frames.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k_even_hard_small_1ep.pt
  device: auto
  image_size: 640
  score_threshold: 0.10
  score_thresholds_by_kind:
    pedestrian: 0.10
    vehicle: 0.20
    traffic_sign: 0.15
    traffic_light: 0.15
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
