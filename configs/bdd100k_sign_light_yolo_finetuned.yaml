# BDD100K fine-tuned sign/light YOLO evaluation profile.
# Expects weights copied to outputs/models/sign_light_yolov8n_bdd100k.pt.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/sign_light_yolov8n_bdd100k.pt
  device: auto
  image_size: 640
  score_threshold: 0.20
  iou_threshold: 0.50
  max_detections: 200
  class_groups:
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
