# BDD100K 1024px kind-tuned detector with experimental size-aware thresholds.
# Tiny boxes use lower thresholds to test whether recall can improve without
# adding a tile pass. Reported metrics should be compared against the 1024px
# kind-tuned baseline on the same frame split.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.20
    vehicle: 0.25
    traffic_sign: 0.25
    traffic_light: 0.20
  size_bucket_areas: [0.0005, 0.0025, 0.01]
  score_thresholds_by_size:
    tiny:
      pedestrian: 0.15
      vehicle: 0.20
      traffic_sign: 0.20
      traffic_light: 0.15
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
