# YOLO-based BDD100K evaluation profile.
# Uses Ultralytics with COCO-pretrained YOLOv8n as a lightweight baseline.
objects:
  enabled: true
  backend: ultralytics
  model: yolov8n.pt
  device: auto
  image_size: 640
  score_threshold: 0.20
  iou_threshold: 0.50
  max_detections: 120
  class_groups:
    pedestrian:
      - person
    vehicle:
      - bicycle
      - car
      - motorcycle
      - bus
      - truck
      - train
    traffic_light:
      - traffic light
    traffic_sign:
      - stop sign

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
