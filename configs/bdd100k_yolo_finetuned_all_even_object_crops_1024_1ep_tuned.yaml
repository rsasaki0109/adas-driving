# BDD100K object-crop 1024px experiment with thresholds selected on even-index frames.
# Train data: even-index validation-mirror frames plus train-only small-object crops.
# Threshold tuning split: even-index 1,000 frames. Report on held-out odd-index frames.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k_even_object_crops_1024_1ep.pt
  device: auto
  image_size: 1024
  score_threshold: 0.10
  score_thresholds_by_kind:
    pedestrian: 0.15
    vehicle: 0.25
    traffic_sign: 0.20
    traffic_light: 0.15
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
