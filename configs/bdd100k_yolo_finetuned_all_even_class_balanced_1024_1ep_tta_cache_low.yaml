# Low-threshold cache config for class-balanced retrain weights + TTA,
# intended as a WBF fusion source providing weight diversity via a different
# augmentation mechanism (frame-level class repeat) than the tl-only
# single-class copy-paste source.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k_even_class_balanced_1024_1ep.pt
  device: auto
  image_size: 1024
  augment: true
  score_threshold: 0.05
  score_thresholds_by_kind:
    pedestrian: 0.05
    vehicle: 0.05
    traffic_sign: 0.05
    traffic_light: 0.05
  iou_threshold: 0.50
  max_detections: 500
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
