# YOLO-based image/video demo profile.
objects:
  enabled: true
  backend: ultralytics
  model: yolov8n.pt
  device: auto
  image_size: 640
  score_threshold: 0.30
  iou_threshold: 0.50
  max_detections: 100
  class_groups:
    pedestrian:
      - person
    vehicle:
      - bicycle
      - car
      - motorcycle
      - bus
      - truck
      - train
    traffic_light:
      - traffic light
    traffic_sign:
      - stop sign

lane_smoothing:
  enabled: true

tracking:
  enabled: true

distance_estimation:
  enabled: true
