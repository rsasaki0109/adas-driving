# Online 7-way WBF fusion config. Runs 7 sub-detectors in process (Ultralytics
# YOLO with different imgsz / TTA / weights) and fuses their predictions via
# Weighted Box Fusion with per-kind IoU thresholds, then applies the final
# per-kind score threshold that was picked by
# scripts/sweep_bdd100k_cached_predictions.py on the even-index 1,000 tune split.
#
# All sub-detectors use score_threshold=0.05 (cache_low) so WBF sees a broad
# candidate pool; the post-fusion threshold filters the final outputs. Expected
# runtime: ~2.8 FPS on GPU with BDD100K 720x1280 frames.
objects:
  enabled: true
  detectors:
    # 1. no-TTA 1024 (current best weights)
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 1024
      augment: false
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 2. TTA 1024 (current best weights)
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 1024
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 3. tl-only retrain + TTA 1024
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k_even_copy_paste_v2_tl_1000_1024_1ep.pt
      image_size: 1024
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 4. TTA 1280
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 1280
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 5. TTA 960
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 960
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 6. TTA 1536
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 1536
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
        pedestrian:
          - pedestrian
          - rider
        vehicle:
          - bicycle
          - bus
          - car
          - motorcycle
          - train
          - truck
        traffic_sign:
          - traffic sign
        traffic_light:
          - traffic light
    # 7. TTA 1792
    - backend: ultralytics
      model: outputs/models/adas_yolov8n_bdd100k.pt
      image_size: 1792
      augment: true
      score_threshold: 0.05
      score_thresholds_by_kind:
        pedestrian: 0.05
        vehicle: 0.05
        traffic_sign: 0.05
        traffic_light: 0.05
      iou_threshold: 0.50
      max_detections: 500
      class_groups:
