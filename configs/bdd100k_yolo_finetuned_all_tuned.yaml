# BDD100K fine-tuned single YOLOv8n detector with v0 tuned score thresholds.
# The per-kind thresholds were selected from a 1,000-image BDD100K val sweep.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 640
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.15
    vehicle: 0.25
    traffic_sign: 0.20
    traffic_light: 0.20
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
