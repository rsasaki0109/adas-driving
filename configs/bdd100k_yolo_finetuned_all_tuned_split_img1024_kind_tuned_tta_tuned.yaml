# Current best weights + TTA (augment=True) + per-kind thresholds re-tuned for
# the TTA prediction distribution on the even-index 1,000 tune split. TTA
# raises recall but lowers precision, so this config uses noticeably higher
# kind thresholds than the non-TTA current best. Report on odd-index 5,000.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  augment: true
  score_threshold: 0.20
  score_thresholds_by_kind:
    pedestrian: 0.35
    vehicle: 0.35
    traffic_sign: 0.35
    traffic_light: 0.30
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
