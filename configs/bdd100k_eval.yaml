# Public-data evaluation profile for BDD100K object labels.
# This favors accuracy over latency for offline metric runs.
objects:
  enabled: true
  model: retinanet_resnet50_fpn_v2
  weights: DEFAULT
  score_threshold: 0.30
  max_detections: 120

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
