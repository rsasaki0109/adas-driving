# Current best config + Ultralytics TTA (augment=True at predict time).
# No retraining — same weights as
# configs/bdd100k_yolo_finetuned_all_tuned_split_img1024_kind_tuned.yaml,
# but inference does horizontal-flip + multi-scale TTA via
# ultralytics.YOLO.predict(augment=True). Report on odd-index 5,000 frames
# and compare against current best (0.6355).
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  augment: true
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.20
    vehicle: 0.25
    traffic_sign: 0.25
    traffic_light: 0.20
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
