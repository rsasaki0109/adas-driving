# Low-threshold cache config for no-TTA current best (for WBF fusion studies).
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  score_threshold: 0.05
  score_thresholds_by_kind:
    pedestrian: 0.05
    vehicle: 0.05
    traffic_sign: 0.05
    traffic_light: 0.05
  iou_threshold: 0.50
  max_detections: 500
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
