schema_version: planning.v0.1

pseudo_ego_speed:
  default_mps: 8.0
  config_confidence_factor: 0.70
  max_mps: 25.0
  closing_rate:
    enabled: true
    min_range_rate_mps: 0.5
    confidence_factor: 0.50

memory:
  lane_hold_frames: 4
  lane_decay_per_frame: 0.15

lane_target:
  num_samples: 14
  min_lane_confidence: 0.10
  path_y_start_ratio: 0.94
  path_y_end_ratio: 0.52

lead_follow:
  warning_distance_m: 10.0
  critical_distance_m: 5.0
  lane_corridor_width_ratio: 0.60
  min_vehicle_confidence: 0.20
  track_history_frames: 10
  ttc_warning_s: 2.0
  default_ego_speed_mps: 8.0

traffic_light:
  min_confidence: 0.20
  red_enter_frames: 2
  green_exit_frames: 3
  unknown_hold_frames: 2

vru_yield:
  warning_distance_m: 20.0
  lane_corridor_width_ratio: 0.75
  min_confidence: 0.25
  speed_cap_ratio: 0.55
  default_ego_speed_mps: 8.0

lane_departure:
  enter_offset_ratio: 0.20
  exit_offset_ratio: 0.14
  ego_x_ratio: 0.5
  ego_y_ratio: 0.92

overlay:
  panel_alpha: 0.85
