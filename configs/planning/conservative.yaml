schema_version: planning.v0.1

pseudo_ego_speed:
  default_mps: null
  config_confidence_factor: 0.60
  max_mps: 35.0
  closing_rate:
    enabled: true
    min_range_rate_mps: 0.4
    confidence_factor: 0.40

memory:
  lane_hold_frames: 8
  lane_decay_per_frame: 0.08

lane_target:
  num_samples: 18
  min_lane_confidence: 0.20
  path_y_start_ratio: 0.95
  path_y_end_ratio: 0.58

lead_follow:
  warning_distance_m: 16.0
  critical_distance_m: 8.0
  lane_corridor_width_ratio: 0.50
  min_vehicle_confidence: 0.30
  track_history_frames: 15
  ttc_warning_s: 3.0
  default_ego_speed_mps: null

traffic_light:
  min_confidence: 0.30
  red_enter_frames: 3
  green_exit_frames: 4
  unknown_hold_frames: 3

vru_yield:
  warning_distance_m: 30.0
  lane_corridor_width_ratio: 0.65
  min_confidence: 0.35
  speed_cap_ratio: 0.45
  default_ego_speed_mps: null

lane_departure:
  enter_offset_ratio: 0.15
  exit_offset_ratio: 0.10
  ego_x_ratio: 0.5
  ego_y_ratio: 0.92

overlay:
  panel_alpha: 0.82
