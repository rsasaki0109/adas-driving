# Conservative tile experiment for BDD100K 1024px kind-tuned detector.
# Runs the normal full-frame pass, then adds left/right tile detections only
# for tiny boxes with higher tile-only score thresholds.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1024
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.20
    vehicle: 0.25
    traffic_sign: 0.25
    traffic_light: 0.20
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light
  tile_inference:
    enabled: true
    include_full_frame: true
    rows: 1
    cols: 2
    overlap_ratio: 0.15
    image_size: 960
    max_detections: 80
    combined_max_detections: 300
    max_box_area_ratio: 0.0005
    score_threshold: 0.35
    score_thresholds_by_kind:
      pedestrian: 0.35
      vehicle: 0.45
      traffic_sign: 0.35
      traffic_light: 0.30
    kinds:
      - pedestrian
      - vehicle
      - traffic_sign
      - traffic_light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
