# BDD100K split-tuned single YOLOv8n detector evaluated at 1280px input size.
# This keeps the same weights and per-kind thresholds as the 640px/960px
# split-tuned configs so the effect of input resolution can be measured.
objects:
  enabled: true
  backend: ultralytics
  model: outputs/models/adas_yolov8n_bdd100k.pt
  device: auto
  image_size: 1280
  score_threshold: 0.15
  score_thresholds_by_kind:
    pedestrian: 0.20
    vehicle: 0.25
    traffic_sign: 0.20
    traffic_light: 0.20
  iou_threshold: 0.50
  max_detections: 240
  class_groups:
    pedestrian:
      - pedestrian
      - rider
    vehicle:
      - bicycle
      - bus
      - car
      - motorcycle
      - train
      - truck
    traffic_sign:
      - traffic sign
    traffic_light:
      - traffic light

signs:
  enabled: false

traffic_lights:
  enabled: false

lane_smoothing:
  enabled: false

tracking:
  enabled: false

distance_estimation:
  enabled: false

visualization:
  show_summary: true
